# Prefix: Ctrl-A (more comfortable than Ctrl-B at speed)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config without nuking the session
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits with characters that make visual sense
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Prefix-free pane navigation (Alt-Arrow)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Sensible defaults
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set  -g base-index 1
setw -g pane-base-index 1
set  -g mouse on
set  -g history-limit 10000
set  -g escape-time 10
set  -g focus-events on
setw -g mode-keys vi

# Status bar — minimal, no plugins in v1
set -g status-style "bg=default,fg=white"
set -g status-left  "[#S] "
set -g status-right "%H:%M "
