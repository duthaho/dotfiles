# kitty.conf — cross-platform terminal config for this dotfiles repo.
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Stowed to ~/.config/kitty/kitty.conf on macOS and Linux (no Windows build).

# --- Font ---
# JetBrainsMono Nerd Font is this repo's standard font; bootstrap installs it.
# If it's missing, kitty falls back to a system monospace (prompt/tool icons
# may render as boxes) — install it or change font_family below.
font_family        JetBrainsMono Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          13.0

# --- Theme ---
# Pick one interactively with:  kitty +kitten themes
# That writes ~/.config/kitty/current-theme.conf, included here if present.
# (kitty warns but continues until the file exists — that's expected on a
# fresh install.)
include current-theme.conf

# --- Shell integration ---
# kitty enables zsh/bash integration automatically; 'enabled' is explicit.
shell_integration enabled

# --- Sane defaults ---
scrollback_lines            10000
enable_audio_bell           no
copy_on_select              yes
confirm_os_window_close     0
window_padding_width        6
cursor_blink_interval       0
tab_bar_edge                bottom
tab_bar_style               powerline
remember_window_size        yes

# --- macOS niceties (ignored on Linux) ---
macos_option_as_alt                 yes
macos_quit_when_last_window_closed  yes
